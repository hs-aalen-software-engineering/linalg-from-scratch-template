name: python-tests

on:
  push:
    paths:
      - "python/**"
      - ".github/workflows/python-tests.yml"
  pull_request:
    paths:
      - "python/**"
      - ".github/workflows/python-tests.yml"
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest -v
